name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build and Package
      run: npm run package
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: release/

name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build
      run: npm run build
      
    - name: Package Windows App
      run: npx electron-builder --win --dir
      
    - name: Create zip
      run: Compress-Archive -Path "release\win-unpacked\*" -DestinationPath "release\WebnovelStudio-win.zip"
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: release/
